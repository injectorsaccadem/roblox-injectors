<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Первый сайт со всеми инжекторами Roblox</title>
    <style>
        /* Общие настройки и космический фон */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            background: linear-gradient(rgba(10, 10, 25, 0.85), rgba(10, 10, 25, 0.95)), 
                        url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Эффект мерцающих звезд на фоне */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            opacity: 0.3;
            z-index: -1;
        }

        /* Главный контейнер */
        .container {
            text-align: center;
            max-width: 1200px;
            padding: 20px;
            z-index: 1;
        }

        /* Крупный заголовок */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(0, 149, 255, 0.6);
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Сетка для карточек инжекторов */
        .grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Карточка инжектора */
        .card {
            background: rgba(20, 20, 43, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 250px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Название инжектора */
        .card h2 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        /* Описание */
        .card p {
            font-size: 1rem;
            color: #b0b0d0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Кнопка скачивания с анимацией подъема */
        .download-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #0095ff, #002244);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 242, 254, 0.5);
            box-shadow: 0 4px 15px rgba(0, 149, 255, 0.4);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }

        /* Анимация при наведении: кнопка поднимается */
        .download-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 242, 254, 0.7);
            background: linear-gradient(135deg, #00f2fe, #0095ff);
        }

        /* Кнопка при нажатии */
        .download-btn:active {
            transform: translateY(-2px);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; margin-bottom: 30px; }
            .card { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Первый сайт со всеми инжекторами!</h1>
        
        <div class="grid">
            <!-- Xeno -->
            <div class="card">
                <h2>Xeno</h2>
                <p>Мощный инструмент для запуска скриптов.</p>
                <!-- Замените '#' на реальную ссылку для скачивания -->
                <a href="#" class="download-btn" download>Скачать</a>
            </div>

            <!-- Solara -->
            <div class="card">
                <h2>Solara</h2>
                <p>Стабильный и быстрый инжектор нового поколения.</p>
                <a href="#" class="download-btn" download>Скачать</a>
            </div>

            <!-- Swift -->
            <div class="card">
                <h2>Swift</h2>
                <p>Минималистичный интерфейс и высокая скорость.</p>
                <a href="#" class="download-btn" download>Скачать</a>
            </div>
        </div>
    </div>

</body>
</html>
